[pytest]
# Python 路徑設定：將 src 目錄加入 Python path，以便使用絕對導入 (from data_exporter.xxx)
pythonpath = src

# 日誌設定
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 測試選項
addopts = 
    --strict-markers
    --strict-config
    --color=yes
    --tb=short
    --durations=10
    -ra
    --envfile config/.env.template
    --capture=no
    -s
    ; --loguru-disable=0

# 注意：pytest-dotenv 的 --envfile 選項會在 pytest 啟動時載入環境變數
# env.py 會檢查環境變數是否已存在，如果已存在則跳過載入，避免重複載入


# 過濾警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:clickhouse_connect
    ignore::UserWarning:django



# 測試檔案模式
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# 測試標記
markers =
    unit: 單元測試（快速，不依賴外部服務）
    integration: 整合測試（需要 ClickHouse）

# 測試目錄
testpaths = tests

# 最小版本要求
minversion = 6.0

# 並行測試（如果安裝了 pytest-xdist）
# addopts = --numprocesses=auto

# 覆蓋率設定（如果安裝了 pytest-cov）
# addopts = --cov=factory_api --cov-report=html --cov-report=term-missing
